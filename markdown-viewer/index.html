<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Paste or upload Markdown to see it rendered with GFM, code highlighting, math, and Mermaid diagrams">
    <title>Markdown Viewer | tools.lborgav</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
        window.__mermaid = mermaid;
    </script>
    <style>
        /* Toggle switch (mirrors jsonl-viewer) */
        .toggle-switch { position: relative; display: inline-block; width: 2rem; height: 1.1rem; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: #B4B4B4; border-radius: 9999px; cursor: pointer; transition: background 0.15s; }
        .toggle-slider::before { content: ''; position: absolute; width: 0.8rem; height: 0.8rem; left: 0.15rem; bottom: 0.15rem; background: white; border-radius: 50%; transition: transform 0.15s; }
        input:checked + .toggle-slider { background: #494848; }
        input:checked + .toggle-slider::before { transform: translateX(0.9rem); }

        /* Rendered markdown */
        .markdown-body { color: #494848; line-height: 1.6; }
        .markdown-body h1 { font-size: 1.6rem; font-weight: 600; margin: 1.4rem 0 0.8rem; padding-bottom: 0.3rem; border-bottom: 1px solid #D4D4D4; }
        .markdown-body h2 { font-size: 1.3rem; font-weight: 600; margin: 1.2rem 0 0.6rem; padding-bottom: 0.25rem; border-bottom: 1px solid #D4D4D4; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        .markdown-body h4, .markdown-body h5, .markdown-body h6 { font-weight: 600; margin: 0.9rem 0 0.4rem; }
        .markdown-body p { margin: 0.6rem 0; }
        .markdown-body a { color: #494848; text-decoration: underline; text-underline-offset: 2px; }
        .markdown-body a:hover { color: #636363; }
        .markdown-body ul, .markdown-body ol { margin: 0.6rem 0; padding-left: 1.5rem; }
        .markdown-body ul { list-style: disc; }
        .markdown-body ol { list-style: decimal; }
        .markdown-body li { margin: 0.2rem 0; }
        .markdown-body li > input[type="checkbox"] { margin-right: 0.4rem; }
        .markdown-body blockquote { border-left: 3px solid #B4B4B4; padding: 0.2rem 0.9rem; color: #636363; font-style: italic; margin: 0.7rem 0; }
        .markdown-body code { background: #D4D4D4; color: #494848; padding: 0.1rem 0.35rem; border-radius: 0.25rem; font-size: 0.9em; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
        .markdown-body pre { background: #F5F5F5; border: 1px solid #D4D4D4; border-radius: 0.5rem; padding: 0.8rem; overflow-x: auto; margin: 0.8rem 0; }
        .markdown-body pre code { background: transparent; padding: 0; border-radius: 0; font-size: 0.85rem; }
        .markdown-body pre.mermaid { background: transparent; border: none; padding: 0.5rem 0; text-align: center; }
        .markdown-body table { border-collapse: collapse; margin: 0.8rem 0; font-size: 0.9rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #D4D4D4; padding: 0.4rem 0.7rem; }
        .markdown-body th { background: #F5F5F5; font-weight: 600; }
        .markdown-body hr { border: none; border-top: 1px solid #D4D4D4; margin: 1.2rem 0; }
        .markdown-body img { max-width: 100%; height: auto; border-radius: 0.25rem; }
        .markdown-body .katex-display { margin: 0.6rem 0; }

        /* Frontmatter block */
        .frontmatter { background: #F5F5F5; border: 1px solid #D4D4D4; border-radius: 0.5rem; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; }
        .frontmatter-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; color: #909090; text-transform: uppercase; margin-bottom: 0.5rem; }
        .frontmatter dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.25rem 1rem; margin: 0; }
        .frontmatter dt { font-weight: 600; color: #636363; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
        .frontmatter dd { color: #494848; margin: 0; word-break: break-word; }
    </style>
</head>
<body class="bg-white h-screen flex flex-col text-[#494848] overflow-hidden">
    <header class="shrink-0 w-full bg-[#494848] text-[#D4D4D4] px-4 py-3 flex items-center">
        <a href="/" class="hover:text-white text-xl leading-none w-6" title="Back to tools" aria-label="Back">&larr;</a>
        <h1 class="flex-1 text-center text-sm font-medium tracking-wide">MARKDOWN VIEWER</h1>
        <span class="w-6"></span>
    </header>
    <main class="flex-1 flex min-h-0 w-full">
        <!-- Input column -->
        <section id="input-col" class="flex flex-col min-w-0 flex-1 border-r border-[#D4D4D4]">
            <div class="shrink-0 flex items-center justify-between px-4 py-2 border-b border-[#D4D4D4]">
                <label for="md-input" class="text-xs font-semibold tracking-wider text-[#636363] uppercase">Input</label>
                <label class="text-sm text-[#909090] hover:text-[#494848] cursor-pointer hover:underline">
                    Upload .md
                    <input type="file" id="file-upload" accept=".md,.markdown,.txt" class="hidden">
                </label>
            </div>
            <textarea
                id="md-input"
                class="flex-1 min-h-0 p-4 font-mono text-sm resize-none focus:outline-none bg-white border-0"
                placeholder="Paste Markdown here... YAML frontmatter (---) is parsed and shown above the rendered output."
                spellcheck="false"
            ></textarea>
            <div class="shrink-0 flex items-center gap-3 px-4 py-3 border-t border-[#D4D4D4] bg-[#F5F5F5]">
                <button id="btn-parse" class="px-4 py-1.5 text-sm font-medium bg-[#494848] text-white rounded-md hover:bg-[#636363]">
                    Render
                </button>
                <button id="btn-clear" class="px-4 py-1.5 text-sm font-medium text-[#909090] hover:text-[#494848]">
                    Clear
                </button>
                <span id="error-msg" class="ml-auto text-sm text-[#909090] truncate"></span>
            </div>
        </section>
        <!-- Output column -->
        <section id="output-col" class="flex flex-col min-w-0 flex-1">
            <div class="shrink-0 flex items-center justify-between px-4 py-2 border-b border-[#D4D4D4]">
                <p class="text-xs font-semibold tracking-wider text-[#636363] uppercase">Output</p>
                <div class="flex items-center gap-4 text-sm">
                    <label class="flex items-center gap-1.5 text-[#909090] cursor-pointer select-none">
                        <span>Render Math</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-math">
                            <span class="toggle-slider"></span>
                        </label>
                    </label>
                    <button id="btn-toggle-input" class="text-[#909090] hover:text-[#494848] hover:underline" title="Toggle input panel">Hide input</button>
                </div>
            </div>
            <div id="md-output" class="markdown-body flex-1 min-h-0 p-6 bg-white overflow-auto text-sm"></div>
        </section>
    </main>

    <script>
        const input         = document.getElementById('md-input');
        const output        = document.getElementById('md-output');
        const errorMsg      = document.getElementById('error-msg');
        const btnParse      = document.getElementById('btn-parse');
        const btnClear      = document.getElementById('btn-clear');
        const fileUpload    = document.getElementById('file-upload');
        const toggleMath    = document.getElementById('toggle-math');
        const btnToggleInput = document.getElementById('btn-toggle-input');
        const inputCol      = document.getElementById('input-col');

        btnToggleInput.addEventListener('click', function () {
            const hidden = inputCol.classList.toggle('hidden');
            btnToggleInput.textContent = hidden ? 'Show input' : 'Hide input';
        });

        let mermaidCounter = 0;

        function escapeAttr(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Extract YAML-ish frontmatter (simple key: value lines, optionally quoted; arrays via [a, b] kept as raw string).
        function extractFrontmatter(text) {
            const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
            if (!m) return { fm: null, body: text };
            const fm = [];
            m[1].split(/\r?\n/).forEach(function (line) {
                if (!line.trim() || line.trim().startsWith('#')) return;
                const idx = line.indexOf(':');
                if (idx === -1) return;
                const k = line.slice(0, idx).trim();
                let v = line.slice(idx + 1).trim();
                if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
                    v = v.slice(1, -1);
                }
                fm.push([k, v]);
            });
            return { fm: fm.length ? fm : null, body: m[2] };
        }

        function renderFrontmatter(fm) {
            let html = '<div class="frontmatter"><div class="frontmatter-label">Frontmatter</div><dl>';
            fm.forEach(function (pair) {
                html += '<dt>' + escapeAttr(pair[0]) + '</dt><dd>' + escapeAttr(pair[1]) + '</dd>';
            });
            html += '</dl></div>';
            return html;
        }

        // Custom marked renderer: emit <pre class="mermaid"> for ```mermaid blocks
        const renderer = new marked.Renderer();
        const defaultCode = renderer.code.bind(renderer);
        renderer.code = function(code, lang, escaped) {
            // marked v12+ may pass an object; normalize
            if (typeof code === 'object' && code !== null) {
                lang = code.lang;
                code = code.text;
            }
            if ((lang || '').trim().toLowerCase() === 'mermaid') {
                // Raw source — DOMPurify will keep <pre> with class
                const escapedSrc = code
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                return '<pre class="mermaid">' + escapedSrc + '</pre>';
            }
            return defaultCode({ text: code, lang: lang, escaped: escaped });
        };

        marked.setOptions({ gfm: true, breaks: false });

        function render() {
            const raw = input.value;
            errorMsg.textContent = '';
            if (!raw.trim()) {
                errorMsg.textContent = 'Input is empty.';
                return;
            }

            const { fm, body } = extractFrontmatter(raw);

            let html;
            try {
                html = marked.parse(body, { renderer: renderer });
            } catch (e) {
                errorMsg.textContent = 'Parse error: ' + e.message;
                return;
            }

            const safe = DOMPurify.sanitize(html, {
                ADD_TAGS: ['details', 'summary'],
                ADD_ATTR: ['target'],
            });

            output.innerHTML = (fm ? renderFrontmatter(fm) : '') + safe;

            // Syntax-highlight non-mermaid code blocks
            output.querySelectorAll('pre code').forEach(function(block) {
                if (block.parentElement.classList.contains('mermaid')) return;
                try { hljs.highlightElement(block); } catch (e) { /* ignore */ }
            });

            // Render Mermaid diagrams
            const mermaidBlocks = output.querySelectorAll('pre.mermaid');
            if (mermaidBlocks.length && window.__mermaid) {
                mermaidBlocks.forEach(function(b) {
                    if (!b.id) b.id = 'mermaid-' + (++mermaidCounter);
                });
                window.__mermaid.run({ nodes: Array.from(mermaidBlocks) }).catch(function(err) {
                    console.error('Mermaid render error:', err);
                });
            }

            if (toggleMath.checked) applyMath();
        }

        function applyMath() {
            if (typeof renderMathInElement === 'undefined') return;
            renderMathInElement(output, {
                delimiters: [
                    { left: '$$', right: '$$', display: true  },
                    { left: '$',  right: '$',  display: false },
                    { left: '\\(', right: '\\)', display: false },
                    { left: '\\[', right: '\\]', display: true  },
                ],
                ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                throwOnError: false,
            });
        }

        btnParse.addEventListener('click', render);

        input.addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                e.preventDefault();
                render();
            }
        });

        btnClear.addEventListener('click', function() {
            input.value = '';
            output.innerHTML = '';
            errorMsg.textContent = '';
            input.focus();
        });

        toggleMath.addEventListener('change', function() {
            if (input.value.trim()) render();
        });

        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                input.value = evt.target.result;
                render();
            };
            reader.readAsText(file);
            fileUpload.value = '';
        });
    </script>
</body>
</html>
